<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PlotKityCat</title>
    <style>
      /* 首屏 splash：hydration 前即时显示，避开白屏。淡出由 main.tsx 触发 */
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #fefcf7;
        transition: opacity 0.48s cubic-bezier(0.22, 1, 0.36, 1);
      }
      #app-splash.is-hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-splash-img {
        width: 80px;
        height: 80px;
        border-radius: 18px;
        animation: app-splash-breathe 1.8s ease-in-out infinite;
      }
      @keyframes app-splash-breathe {
        0%, 100% { transform: scale(1); opacity: 0.85; }
        50% { transform: scale(1.06); opacity: 1; }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-splash-img { animation: none; opacity: 0.9; }
      }
    </style>
  </head>
  <body>
    <div id="app-splash" aria-hidden="true">
      <img id="app-splash-img" src="/logo.png" alt="" />
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 1. 极致简洁的黑板框：仅用最少的手绘线条勾勒 -->
  <path d="M 18,22             C 35,20 65,20 82,22             L 82,70             C 65,72 35,72 18,70             Z" fill="none" stroke="#333333" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 2. 纯粹的数学符号：黑板中央只留一个极简的直角坐标与波形图 -->
  <!-- 纵轴与横轴 -->
  <path d="M 50,30 L 50,62 M 34,48 L 66,48" fill="none" stroke="#333333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 贯穿坐标的一条平滑数学曲线 -->
  <path d="M 38,58 C 44,58 44,38 50,48 C 56,58 56,38 62,38" fill="none" stroke="#333333" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
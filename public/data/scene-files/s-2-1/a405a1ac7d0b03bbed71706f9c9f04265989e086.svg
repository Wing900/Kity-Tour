<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- 头型：微微倾斜的鸭蛋圆 -->
  <path d="M 50,22 C 41,21 39,38 49,39 C 59,40 58,23 50,22 Z" fill="none" stroke="#333333" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- 无奈的表情：下垂的眼和一根表示叹气或撇嘴的斜线 -->
  <path d="M 44,28 L 47,30 M 55,29 L 52,31" stroke="#333333" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 46,35 C 49,34 51,34 53,36" fill="none" stroke="#333333" stroke-width="2.5" stroke-linecap="round"/>

  <!-- 身体与耸肩、摊手（不得已的灵魂姿态） -->
  <!-- 左手摊开 -->
  <path d="M 22,58 C 28,58 32,54 40,48" fill="none" stroke="#333333" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 右手摊开（故意不对称，更显生动） -->
  <path d="M 78,60 C 72,59 66,53 58,47" fill="none" stroke="#333333" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- 躯干 -->
  <path d="M 40,48 C 44,46 54,45 58,47 L 55,80 L 43,80 Z" fill="none" stroke="#333333" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 叹气/无奈的动态流线 -->
  <path d="M 62,38 C 66,39 68,43 67,46" fill="none" stroke="#333333" stroke-width="2" stroke-linecap="round" stroke-dasharray="2 3"/>
</svg>